<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Made with heart — personal touches, heartfelt creations, and moments crafted with love.">
    <title>Made with Heart — Bake & Craft by Leidy</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..700;1,400..700&family=Plus+Jakarta+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="page-shell">
        <header class="category-hero container">
            <a href="index.html" class="back-link">← Back to home</a>
            <div class="category-header">
                <p class="eyebrow">Personal stories</p>
                <h1>Made with Heart</h1>
                <p class="category-intro">
                    Behind every piece is a moment, a memory, or a person who inspired it. These are our most personal
                    creations — made with intention, warmth, and genuine care.
                </p>
                <a href="mailto:bake_craft_leidy@outlook.com" class="btn btn-primary">Share your story</a>
            </div>
        </header>

        <main>
            <section class="gallery-section container">
                <div class="image-grid" id="photo-gallery"></div>
            </section>
        </main>

        <footer class="footer container">
            <p>© 2026 Bake & Craft by Leidy</p>
        </footer>
    </div>

    <script>
        const category = 'made-with-heart';
        const imagePath = `images/${category}`;
        
        // Try to load images - attempt up to 20 files to catch all numbered images
        const images = Array.from({ length: 20 }, (_, i) => `${imagePath}/${i + 1}.png`);

        const gallery = document.getElementById('photo-gallery');
        gallery.innerHTML = images.map((src, index) => `
            <article class="gallery-item" style="opacity:0">
                <img src="${src}" alt="Made with heart creation ${index + 1}" loading="lazy" onload="this.parentElement.style.opacity='1'" onerror="this.parentElement.style.display='none'">
            </article>
        `).join('');
    </script>
</body>
</html>
