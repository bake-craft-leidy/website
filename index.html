<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bake & Craft by Leidy</title>
    <link rel="stylesheet" href="style.css">
    <!-- Google Fonts for clean typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..700;1,400..700&family=Plus+Jakarta+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body>

    <!-- Header Section -->
    <header class="header">
        <div class="container">
            <h1 class="brand-title">Bake & Craft</h1>
            <p class="brand-subtitle">by Leidy</p>
            <p class="bio">Handcrafted delights and beautiful creations. Explore my recent work below and connect with me on social media.</p>
            
            <!-- Contact / Social Buttons -->
            <div class="cta-group">
                <a href="https://www.instagram.com/bakeandcraftbyleidy" target="_blank" rel="noopener" class="btn btn-instagram">
                    Follow on Instagram
                </a>
                <a href="mailto:bake_craft_leidy@outlook.com" class="btn btn-email">
                    Get in Touch
                </a>
            </div>
        </div>
    </header>

    <!-- Gallery Section -->
    <main class="gallery-section">
        <div class="container">
           <div class="image-grid" id="photo-gallery">
               <!-- JavaScript will inject the images here -->
           </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="footer">
        <p>&copy; 2026 Bake & Craft by Leidy. All rights reserved.</p>
    </footer>
<script>
    const TOTAL_IMAGES = 6; // Change this number when you upload new photos
    const IMAGES_TO_SHOW = 6;
    
    // 1. Generate the array of filenames programmatically
    const allImages = [];
    for (let i = 1; i <= TOTAL_IMAGES; i++) {
        allImages.push(`images/project-${i}.png`);
    }

    // 2. Shuffle and slice the array
    const shuffled = allImages.sort(() => 0.5 - Math.random());
    const selectedImages = shuffled.slice(0, IMAGES_TO_SHOW);

    // 3. Render to the page
    const gallery = document.getElementById('photo-gallery');
    gallery.innerHTML = selectedImages.map(src => `
        <div class="gallery-item">
            <img src="${src}" alt="Bake and Craft Creation" loading="lazy">
        </div>
    `).join('');
</script>
</body>
</html>
