<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bake & Craft by Leidy</title>
    <link rel="stylesheet" href="style.css">
    <!-- Google Fonts for clean typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..700;1,400..700&family=Plus+Jakarta+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body>

    <!-- Header Section -->
    <header class="header">
        <div class="container">
            <h1 class="brand-title">Bake & Craft</h1>
            <p class="brand-subtitle">by Leidy</p>
            <p class="bio">Handcrafted delights and beautiful creations. Explore my recent work below and connect with me on social media.</p>
            
            <!-- Contact / Social Buttons -->
            <div class="cta-group">
                <a href="https://www.instagram.com/bakeandcraftbyleidy" target="_blank" rel="noopener" class="btn btn-instagram">
                    Follow on Instagram
                </a>
                <a href="mailto:bake_craft_leidy@outlook.com" class="btn btn-email">
                    Get in Touch
                </a>
            </div>
        </div>
    </header>

    <!-- Gallery Section -->
    <main class="gallery-section">
        <div class="container">
            <div class="image-grid">
                <!-- Image Card 1 -->
                <div class="gallery-item">
                    <img src="images/project1.jpg" alt="Beautiful custom cake design" loading="lazy">
                </div>
                <!-- Image Card 2 -->
                <div class="gallery-item">
                    <img src="images/project2.jpg" alt="Handmade crafting detail" loading="lazy">
                </div>
                <!-- Image Card 3 -->
                <div class="gallery-item">
                    <img src="images/project3.jpg" alt="Freshly baked pastries" loading="lazy">
                </div>
                <!-- Image Card 4 -->
                <div class="gallery-item">
                    <img src="images/project4.jpg" alt="Artisanal craft project" loading="lazy">
                </div>
                <!-- Image Card 5 -->
                <div class="gallery-item">
                    <img src="images/project5.jpg" alt="Specialty decorated cookies" loading="lazy">
                </div>
                <!-- Image Card 6 -->
                <div class="gallery-item">
                    <img src="images/project6.jpg" alt="Creative seasonal crafts" loading="lazy">
                </div>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="footer">
        <p>&copy; 2026 Bake & Craft by Leidy. All rights reserved.</p>
    </footer>

</body>
</html>
